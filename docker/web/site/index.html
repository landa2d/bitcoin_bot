<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentPulse Intelligence Brief</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style-base.css">
    <link rel="stylesheet" href="/style-shared.css">
    <link rel="stylesheet" href="/style-map.css">
</head>
<body class="technical">
  <div class="container">
    <!-- Top navigation bar -->
    <nav class="top-nav">
        <div class="nav-left">
            <span class="nav-dot"></span>
            <span class="nav-logo">AGENTPULSE</span>
            <a href="#/map" class="nav-map-link">Map</a>
        </div>
        <button class="btn-subscribe-primary" onclick="scrollToSubscribe()">SUBSCRIBE</button>
    </nav>

    <!-- Hero area -->
    <div class="hero">
        <p class="hero-tagline">WEEKLY INTELLIGENCE BRIEFING</p>
        <h1 class="hero-headline" id="hero-headline"></h1>
        <p class="hero-date" id="hero-date"></p>
        <div class="mode-toggle">
            <button class="toggle-btn active" id="btn-technical" onclick="setMode('technical')">Technical</button>
            <button class="toggle-btn" id="btn-strategic" onclick="setMode('strategic')">Strategic</button>
        </div>
        <p class="mode-subtitle" id="mode-subtitle">Architecture, code, implementation</p>
    </div>

    <main>
        <!-- List view -->
        <div id="list-view">
            <div class="content-area" id="newsletter-list"></div>
        </div>

        <!-- Reader view -->
        <div id="reader-view" style="display:none">
            <div class="content-area">
                <a href="#/" class="back-link">&larr; All editions</a>
                <article id="newsletter-content"></article>
            </div>
        </div>

        <!-- Map (hub) view -->
        <div id="map-view" style="display:none">
            <div class="content-area"></div>
        </div>

        <!-- Block (single-block page) view -->
        <div id="block-view" style="display:none">
            <div class="content-area">
                <a href="#/map" class="back-link">&larr; Map</a>
                <div id="block-content"></div>
            </div>
        </div>

        <!-- Status (maturity snapshot) view -->
        <div id="status-view" style="display:none">
            <div class="content-area" id="status-content"></div>
        </div>
    </main>

    <!-- Subscribe section -->
    <section id="subscribe-section">
        <div class="subscribe-inner">
            <h2 class="subscribe-heading">Get the Intelligence Brief</h2>
            <p class="subscribe-tagline">Weekly analysis delivered to your inbox. Choose your lens.</p>
            <div class="subscribe-form">
                <input type="email" id="subscribe-email" placeholder="you@example.com" required />
                <div class="mode-preference">
                    <label><input type="radio" name="pref" value="technical" checked /> Technical</label>
                    <label><input type="radio" name="pref" value="strategic" /> Strategic</label>
                    <label><input type="radio" name="pref" value="both" /> Both</label>
                </div>
                <button id="subscribe-btn" onclick="handleSubscribe()">Subscribe</button>
                <p id="subscribe-status" class="subscribe-status"></p>
            </div>
        </div>
    </section>

    <!-- Bottom subscribe bar -->
    <footer class="bottom-bar">
        <span class="bottom-bar-text">Weekly conviction-driven analysis on the agent economy</span>
        <button class="btn-subscribe-secondary" onclick="scrollToSubscribe()">Subscribe</button>
    </footer>

  </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/app.js"></script>
</body>
</html>
